name: Generera dagligt blogginlägg

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  generate-post:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checka ut repot
        uses: actions/checkout@v4

      - name: Sätt upp Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installera beroenden
        run: pip install requests openpyxl

      - name: Kör skriptet
        env:
          FOOTBALL_API_KEY: ${{ secrets.FOOTBALL_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/generate_post.py

      - name: Committa och pusha inlägget
        run: |
          git config user.name "Blogg-boten"
          git config user.email "bot@github.com"
          git add -A
          git diff --staged --quiet && echo "Inget nytt att committa" || (git commit -m "Dagligt blogginlägg $(date +%Y-%m-%d)" && git push)
